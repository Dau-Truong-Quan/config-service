spring.application.name=config-server
server.port=8888

# --- Config Server backend: native filesystem ---
# Place per-service config files under config-repo/ next to this service
# e.g. config-repo/gateway-service.properties
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=classpath:/config-repo

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,env,refresh
management.endpoint.health.show-details=always
