# Configuration for gateway-service
# Add per-environment overrides here or in gateway-service-{profile}.properties
server.port=8080

# ---------------------------------------------------------------------------
# Eureka client — register the gateway and resolve lb:// URIs via discovery
# ---------------------------------------------------------------------------
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ---------------------------------------------------------------------------
# Routes
# Each route needs: id, uri, at least one predicate, and optional filters.
#
# lb://SERVICE-NAME  resolves the service name through Eureka + load balancer.
# StripPrefix=1      strips the first path segment before forwarding so
#                    /api/account/... is forwarded as /account/... to the service.
# ---------------------------------------------------------------------------

# Route: account-service
spring.cloud.gateway.mvc.routes[0].id=account-service
spring.cloud.gateway.mvc.routes[0].uri=lb://account-service
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/account/**
spring.cloud.gateway.mvc.routes[0].filters[0]=StripPrefix=1

# ---------------------------------------------------------------------------
# Actuator — expose gateway-specific endpoints for route inspection
# ---------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always
management.endpoint.gateway.enabled=true
